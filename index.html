<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CuyAI</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-MocZjEJj1JXgXY4hFzEVDiVaAW1ToVdE6U2rjeIMkq1Ognm5qjDn1oqWS7jRO4CUAg4Oe8vb6HgUFDYBo/xuGQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #1f2937, #111827);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 6px;
    }
    .typing-text::after {
      content: '...';
      animation: dots 1.5s steps(3, end) infinite;
    }

    @keyframes dots {
      0%, 20% {
        content: '';
      }
      40% {
        content: '.';
      }
      60% {
        content: '..';
      }
      80%, 100% {
        content: '...';
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-6 text-white">
  <div class="w-full max-w-2xl bg-[#1e1e2f] shadow-2xl rounded-2xl p-6 space-y-5 border border-gray-700 backdrop-blur-md bg-opacity-80">
    <h1 class="text-3xl font-bold flex items-center gap-3 text-pink-500 drop-shadow">
      <i class="fas fa-robot animate-bounce"></i> CuyAI - Chat Gemini
    </h1>

    <div id="chat-box" class="h-[60vh] overflow-y-auto bg-[#2a2a3d] rounded-xl p-4 space-y-3 border border-gray-700 scroll-smooth text-sm sm:text-base break-words">
      <!-- Chat messages will be injected here -->
    </div>

    <form id="chat-form" class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
      <input type="text" id="user-input" placeholder="Tulis pesan..." required autocomplete="off"
             class="flex-1 px-4 py-3 rounded-lg bg-gray-800 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all duration-200" />
      <button type="submit"
              class="bg-pink-600 hover:bg-pink-700 active:scale-95 transition text-white px-4 py-3 rounded-lg flex items-center justify-center gap-2 shadow-md">
        <i class="fas fa-paper-plane"></i> <span class="hidden sm:inline">Kirim</span>
      </button>
    </form>

    <button onclick="clearChat()" class="text-sm text-gray-400 hover:text-pink-400 mt-2 transition">
      🗑️ Hapus Riwayat Chat
    </button>
  </div>

<script>
  function clearChat() {
    localStorage.removeItem('chatHistory');
    chatBox.innerHTML = '';
  }

  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');
  const chatBox = document.getElementById('chat-box');
  const history = JSON.parse(localStorage.getItem('chatHistory')) || [];

  history.forEach(msg => {
    chatBox.innerHTML += renderMessage(msg.sender, msg.text);
  });

  chatBox.scrollTop = chatBox.scrollHeight;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const userMessage = input.value.trim();
    if (!userMessage) return;

    chatBox.innerHTML += renderMessage('user', userMessage);
    saveToHistory('user', userMessage);
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    const typingDiv = document.createElement('div');
    typingDiv.id = 'typing-indicator';
    typingDiv.innerHTML = renderTyping();
    chatBox.appendChild(typingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user_input: userMessage })
    });

    const aiText = await response.text();

    typingDiv.remove();
    chatBox.innerHTML += renderMessage('ai', aiText);
    saveToHistory('ai', aiText);
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  function renderMessage(sender, text) {
    if (sender === 'user') {
      return `
        <div class="text-right">
          <div class="inline-flex items-start justify-end gap-2 mb-1">
            <span class="bg-pink-600 text-white px-4 py-2 rounded-xl max-w-[80%] inline-block">
              <strong>Kamu:</strong> ${text}
            </span>
            <img src="https://ui-avatars.com/api/?name=Kamu" class="w-8 h-8 rounded-full" alt="user" />
          </div>
        </div>
      `;
    } else {
      return `
        <div class="text-left">
          <div class="inline-flex items-start gap-2 mb-1">
            <img src="https://i.ibb.co/5cXw9Hp/robot-avatar.png" class="w-8 h-8 rounded-full" alt="CuyAI" />
            <span class="bg-gray-700 text-white px-4 py-2 rounded-xl max-w-[80%] inline-block">
              <strong>CuyAI:</strong> ${text}
            </span>
          </div>
        </div>
      `;
    }
  }

  function renderTyping() {
    return `
      <div class="inline-flex items-center gap-2 mb-1" id="typing-line">
        <img src="https://i.ibb.co/5cXw9Hp/robot-avatar.png" class="w-8 h-8 rounded-full" />
        <span class="bg-gray-700 text-white px-4 py-2 rounded-xl flex items-center typing-text">
          <strong class="mr-2">CuyAI:</strong>
        </span>
      </div>
    `;
  }

  function saveToHistory(sender, text) {
    history.push({ sender, text });
    localStorage.setItem('chatHistory', JSON.stringify(history));
  }
</script>

</body>
</html>

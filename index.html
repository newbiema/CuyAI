<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CuyAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-MocZjEJj1JXgXY4hFzEVDiVaAW1ToVdE6U2rjeIMkq1Ognm5qjDn1oqWS7jRO4CUAg4Oe8vb6HgUFDYBo/xuGQ=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 6px;
    }

    /* Style chat messages */
    .chat-message.ai {
      background-color: rgba(255, 182, 193, 0.15); /* pink translucent */
      padding: 8px 12px;
      border-radius: 16px;
      max-width: 75%;
      line-height: 1.5;
      color: #ffe4e6; /* pinkish-white */
      word-wrap: break-word;
      white-space: pre-line; /* preserve line breaks */
      font-size: 0.95rem;
      font-weight: 400;
      transition: background-color 0.3s ease;
    }

    .chat-message.user {
      background-color: #ec4899; /* pink-500 */
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 75%;
      line-height: 1.5;
      color: white;
      word-wrap: break-word;
      white-space: pre-line;
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* Container flex alignment */
    .text-left > div.inline-flex {
      align-items: flex-start;
    }

    .text-right > div.inline-flex {
      justify-content: flex-end;
      align-items: flex-start;
    }

    /* Responsive max-width for mobile */
    @media (max-width: 640px) {
      .chat-message.ai,
      .chat-message.user {
        max-width: 90%;
      }
    }

    /* Input focus ring override to pink */
    input:focus {
      outline: none;
      ring-color: #ec4899;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex items-center justify-center px-4 py-6">
  <div
    class="w-full max-w-2xl bg-gray-900 shadow-2xl rounded-2xl p-6 space-y-4 border border-gray-700 flex flex-col"
    style="height: 90vh; max-height: 700px;"
  >
    <h1 class="text-2xl font-semibold flex items-center gap-2 text-pink-500 shrink-0">
      <i class="fas fa-robot"></i> CuyAI - Chat Gemini
    </h1>

    <div
      id="chat-box"
      class="flex-1 overflow-y-auto bg-gray-800 rounded-xl p-4 space-y-3 border border-gray-700 scroll-smooth text-sm sm:text-base break-words"
    >
      <!-- Chat messages will be injected here -->
    </div>

    <form id="chat-form" class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 mt-4 shrink-0">
      <input
        type="text"
        id="user-input"
        placeholder="Tulis pesan..."
        required
        autocomplete="off"
        class="flex-1 px-4 py-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 transition"
      />
      <button
        type="submit"
        class="bg-pink-600 hover:bg-pink-700 transition text-white px-4 py-3 rounded-lg flex items-center justify-center gap-2"
      >
        <i class="fas fa-paper-plane"></i> <span class="hidden sm:inline">Kirim</span>
      </button>
    </form>

    <button
      onclick="clearChat()"
      class="text-sm text-gray-400 hover:text-pink-400 mt-2 self-start shrink-0"
      aria-label="Hapus Riwayat Chat"
    >
      🗑️ Hapus Riwayat Chat
    </button>
  </div>

  <script>
    function clearChat() {
      localStorage.removeItem('chatHistory');
      chatBox.innerHTML = '';
    }

    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const history = JSON.parse(localStorage.getItem('chatHistory')) || [];

    // Render history on load
    history.forEach((msg) => {
      chatBox.innerHTML += renderMessage(msg.sender, msg.text);
    });
    chatBox.scrollTop = chatBox.scrollHeight;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userMessage = input.value.trim();
      if (!userMessage) return;

      chatBox.innerHTML += renderMessage('user', userMessage);
      saveToHistory('user', userMessage);
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing-indicator';
      typingDiv.innerHTML = renderTyping();
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_input: userMessage }),
        });

        const aiText = await response.text();

        typingDiv.remove();
        chatBox.innerHTML += renderMessage('ai', aiText);
        saveToHistory('ai', aiText);
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        typingDiv.remove();
        chatBox.innerHTML += renderMessage('ai', 'Maaf, terjadi kesalahan. Silakan coba lagi nanti.');
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    });

    function renderMessage(sender, text) {
      if (sender === 'user') {
        return `
          <div class="text-right">
            <div class="inline-flex justify-end gap-2 mb-1">
              <span class="chat-message user">
                <strong>Kamu:</strong> ${escapeHtml(text)}
              </span>
              <img src="https://ui-avatars.com/api/?name=Kamu" class="w-8 h-8 rounded-full" alt="user" />
            </div>
          </div>
        `;
      } else {
        return `
          <div class="text-left">
            <div class="inline-flex gap-2 mb-1">
              <img src="https://i.ibb.co/5cXw9Hp/robot-avatar.png" class="w-8 h-8 rounded-full" alt="CuyAI" />
              <span class="chat-message ai">
                <strong>CuyAI:</strong> ${escapeHtml(text)}
              </span>
            </div>
          </div>
        `;
      }
    }

    function renderTyping() {
      return `
        <div class="inline-flex items-center gap-2">
          <img src="https://i.ibb.co/5cXw9Hp/robot-avatar.png" class="w-8 h-8 rounded-full" />
          <span class="bg-gray-700 text-white px-4 py-2 rounded-xl flex items-center animate-pulse">
            <strong class="mr-2">CuyAI:</strong>
            <span class="typing-text">sedang mengetik...</span>
          </span>
        </div>
      `;
    }

    function saveToHistory(sender, text) {
      history.push({ sender, text });
      localStorage.setItem('chatHistory', JSON.stringify(history));
    }

    // Simple escape to prevent HTML injection (basic)
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>

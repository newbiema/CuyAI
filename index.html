<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CuyAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="https://i.ibb.co/YZg4Zp6/bot-avatar-modern.png" />
  <script src="https://unpkg.com/@heroicons/vue@2.0.16/24/solid/index.min.js" defer></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 6px;
    }
    .chat-message.ai {
      background-color: rgba(255, 182, 193, 0.15);
      padding: 8px 12px;
      border-radius: 16px;
      max-width: 75%;
      line-height: 1.5;
      color: #ffe4e6;
      white-space: pre-line;
      font-size: 0.95rem;
    }
    .chat-message.user {
      background-color: #ec4899;
      padding: 10px 14px;
      border-radius: 16px;
      max-width: 75%;
      color: white;
      white-space: pre-line;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .text-left > div.inline-flex {
      align-items: flex-start;
    }
    .text-right > div.inline-flex {
      justify-content: flex-end;
    }
    @media (max-width: 640px) {
      .chat-message.ai, .chat-message.user {
        max-width: 90%;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex items-center justify-center px-4 py-6">
  <div class="w-full max-w-2xl bg-gray-900 shadow-2xl rounded-2xl p-6 space-y-4 border border-gray-700 flex flex-col" style="height: 90vh;">
    <h1 class="text-2xl font-semibold flex items-center gap-3 text-pink-500">
      <img src="https://i.ibb.co/YZg4Zp6/bot-avatar-modern.png" class="w-8 h-8 rounded-full" alt="CuyAI Logo" />
      <span>CuyAI - Chat Gemini</span>
    </h1>

    <div id="chat-box" class="flex-1 overflow-y-auto bg-gray-800 rounded-xl p-4 space-y-3 border border-gray-700 scroll-smooth text-sm sm:text-base">
      <!-- Chat messages will be injected here -->
    </div>

    <form id="chat-form" class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 mt-4">
      <input type="text" id="user-input" placeholder="Tulis pesan..." required autocomplete="off" class="flex-1 px-4 py-3 rounded-lg bg-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 transition" />
      <button type="submit" class="bg-pink-600 hover:bg-pink-700 transition text-white px-4 py-3 rounded-lg flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="hidden sm:inline">Kirim</span>
      </button>
    </form>

    <button onclick="clearChat()" class="text-sm text-gray-400 hover:text-pink-400 mt-2 self-start">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4m-4 0a1 1 0 00-1 1v1h6V4a1 1 0 00-1-1m-4 0h4" />
      </svg>
      Hapus Riwayat Chat
    </button>
  </div>

  <script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const history = JSON.parse(localStorage.getItem('chatHistory')) || [];

    history.forEach((msg) => {
      chatBox.innerHTML += renderMessage(msg.sender, msg.text);
    });
    chatBox.scrollTop = chatBox.scrollHeight;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const userMessage = input.value.trim();
      if (!userMessage) return;

      chatBox.innerHTML += renderMessage('user', userMessage);
      saveToHistory('user', userMessage);
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      const typingDiv = document.createElement('div');
      typingDiv.id = 'typing-indicator';
      typingDiv.innerHTML = renderTyping();
      chatBox.appendChild(typingDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_input: userMessage }),
        });

        const aiText = await response.text();

        typingDiv.remove();
        chatBox.innerHTML += renderMessage('ai', aiText);
        saveToHistory('ai', aiText);
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        typingDiv.remove();
        chatBox.innerHTML += renderMessage('ai', '❌ Terjadi kesalahan. Silakan coba lagi.');
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    });

    function renderMessage(sender, text) {
      if (sender === 'user') {
        return `
          <div class="text-right">
            <div class="inline-flex justify-end gap-2 mb-1">
              <span class="chat-message user">
                <strong>Kamu:</strong> ${escapeHtml(text)}
              </span>
              <img src="https://ui-avatars.com/api/?name=Kamu&background=ec4899&color=fff" class="w-8 h-8 rounded-full" />
            </div>
          </div>
        `;
      } else {
        return `
          <div class="text-left">
            <div class="inline-flex gap-2 mb-1">
              <img src="https://i.ibb.co/YZg4Zp6/bot-avatar-modern.png" class="w-8 h-8 rounded-full" />
              <span class="chat-message ai">
                <strong>CuyAI:</strong> ${escapeHtml(text)}
              </span>
            </div>
          </div>
        `;
      }
    }

    function renderTyping() {
      return `
        <div class="inline-flex items-center gap-2">
          <img src="https://i.ibb.co/YZg4Zp6/bot-avatar-modern.png" class="w-8 h-8 rounded-full" />
          <span class="bg-gray-700 text-white px-4 py-2 rounded-xl flex items-center animate-pulse">
            <strong class="mr-2">CuyAI:</strong> sedang mengetik...
          </span>
        </div>
      `;
    }

    function saveToHistory(sender, text) {
      history.push({ sender, text });
      localStorage.setItem('chatHistory', JSON.stringify(history));
    }

    function clearChat() {
      localStorage.removeItem('chatHistory');
      chatBox.innerHTML = '';
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
